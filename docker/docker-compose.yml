name: dictate

# Default compose: pulls prebuilt images from GHCR. No source files needed.
# Works in any host (Docker CLI, Dockge, Portainer, Cosmos, etc.) without
# the surrounding repo.
#
# Configuration model:
#   - Defaults are inline in this file via ${VAR:-default} — the stack
#     boots without a .env file at all.
#   - .env is purely an override layer: any var defined in .env replaces
#     the corresponding default here. Secrets and per-deployment values
#     (API keys, auth secret, custom ports) live only in .env.
#
# To build from source instead of pulling:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
#
# To add the local Whisper sidecar (only needed if ADMIN_ASR_PROVIDER=local):
#   docker compose -f docker-compose.yml -f docker-compose.local-asr.yml up -d
#
#   Without the sidecar, set ADMIN_ASR_PROVIDER=openai-whisper (or groq,
#   deepgram, etc.) in .env so transcriptions use a cloud API instead.
#   That's the recommended setup for most users — the local Whisper
#   model is 500MB-3GB and downloads can stall on flaky networks.

services:
  web:
    image: ${WEB_IMAGE:-ghcr.io/squirrelsoft-py/dictate-web:latest}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      INTERNAL_API_URL: http://api:3001
    depends_on:
      api:
        condition: service_healthy
    networks: [dictate]

  api:
    image: ${API_IMAGE:-ghcr.io/squirrelsoft-py/dictate-api:latest}
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      DATA_DIR: ${DATA_DIR:-/data}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3001}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      LOCAL_ASR_ENDPOINT: ${LOCAL_ASR_ENDPOINT:-http://asr:9000}
      ADMIN_ASR_PROVIDER: ${ADMIN_ASR_PROVIDER:-openai-whisper}
      ADMIN_DIARIZATION_PROVIDER: ${ADMIN_DIARIZATION_PROVIDER:-deepgram}
      ADMIN_LLM_PROVIDER: ${ADMIN_LLM_PROVIDER:-openai-compat}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-2147483648}
      UPLOAD_RETENTION_DAYS: ${UPLOAD_RETENTION_DAYS:-0}
      OPENAI_COMPAT_BASE_URL: ${OPENAI_COMPAT_BASE_URL:-}
      OPENAI_COMPAT_API_KEY: ${OPENAI_COMPAT_API_KEY:-}
      OPENAI_COMPAT_MODEL: ${OPENAI_COMPAT_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - dictate_data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks: [dictate]

  worker:
    image: ${WORKER_IMAGE:-ghcr.io/squirrelsoft-py/dictate-worker:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATA_DIR: ${DATA_DIR:-/data}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LOCAL_ASR_ENDPOINT: ${LOCAL_ASR_ENDPOINT:-http://asr:9000}
      ADMIN_ASR_PROVIDER: ${ADMIN_ASR_PROVIDER:-openai-whisper}
      ADMIN_DIARIZATION_PROVIDER: ${ADMIN_DIARIZATION_PROVIDER:-deepgram}
      ADMIN_LLM_PROVIDER: ${ADMIN_LLM_PROVIDER:-openai-compat}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-2147483648}
      UPLOAD_RETENTION_DAYS: ${UPLOAD_RETENTION_DAYS:-0}
      OPENAI_COMPAT_BASE_URL: ${OPENAI_COMPAT_BASE_URL:-}
      OPENAI_COMPAT_API_KEY: ${OPENAI_COMPAT_API_KEY:-}
      OPENAI_COMPAT_MODEL: ${OPENAI_COMPAT_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - dictate_data:/data
    depends_on:
      redis:
        condition: service_healthy
    networks: [dictate]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "", "--loglevel", "notice"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks: [dictate]

volumes:
  dictate_data:
  redis_data:

networks:
  dictate:
    driver: bridge