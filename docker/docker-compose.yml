name: dictate

services:
  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    image: ghcr.io/dictate/dictate-web:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001
      INTERNAL_API_URL: http://api:3001
    depends_on:
      - api
    networks: [dictate]

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    image: ghcr.io/dictate/dictate-api:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      DATA_DIR: /data
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3001}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
    volumes:
      - dictate_data:/data
    depends_on:
      - redis
    networks: [dictate]

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    image: ghcr.io/dictate/dictate-worker:latest
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      DATA_DIR: /data
      REDIS_URL: redis://redis:6379
    volumes:
      - dictate_data:/data
    depends_on:
      - redis
    networks: [dictate]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks: [dictate]

volumes:
  dictate_data:
  redis_data:

networks:
  dictate:
    driver: bridge