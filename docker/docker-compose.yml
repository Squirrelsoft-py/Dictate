name: dictate

# Default compose: pulls prebuilt images from GHCR. No source files needed.
# Works in any host (Docker CLI, Dockge, Portainer, Cosmos, etc.) without
# the surrounding repo.
#
# To build from source instead of pulling:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build

# Why we pin dns / dns_search / dns_opt:
# On hosts with systemd-resolved (most modern Linux distros, Tailscale,
# rootless Docker under certain setups), /etc/resolv.conf inside containers
# points to 127.0.0.53 (the host's systemd-resolved stub), which is NOT
# reachable from the container's network namespace. Result: every
# service-name lookup (redis, api, worker, ...) fails with EAI_AGAIN.
#
# Docker's embedded DNS at 127.0.0.11 is what resolves compose service
# names for user-defined networks. Pinning dns: 127.0.0.11 forces its
# use regardless of host config.
#
# dns_search: .    -> empty search list so "redis" is looked up as-is,
#                    not "redis.tail620d5.ts.net" first.
# dns_opt ndots:0  -> never try the FQDN form first; try the literal
#                    short hostname and let Docker DNS resolve it.

services:
  web:
    image: ${WEB_IMAGE:-ghcr.io/squirrelsoft-py/dictate-web:latest}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    dns:
      - 127.0.0.11
    dns_search: []
    dns_opt:
      - "ndots:0"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      INTERNAL_API_URL: http://api:3001
    depends_on:
      api:
        condition: service_healthy
    networks: [dictate]

  api:
    image: ${API_IMAGE:-ghcr.io/squirrelsoft-py/dictate-api:latest}
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    dns:
      - 127.0.0.11
    dns_search: []
    dns_opt:
      - "ndots:0"
    environment:
      NODE_ENV: production
      DATA_DIR: /data
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3001}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      LOCAL_ASR_ENDPOINT: ${LOCAL_ASR_ENDPOINT:-http://asr:9000}
      ADMIN_ASR_PROVIDER: ${ADMIN_ASR_PROVIDER:-local}
      ADMIN_DIARIZATION_PROVIDER: ${ADMIN_DIARIZATION_PROVIDER:-local}
      ADMIN_LLM_PROVIDER: ${ADMIN_LLM_PROVIDER:-openai-compat}
      OPENAI_COMPAT_BASE_URL: ${OPENAI_COMPAT_BASE_URL:-}
      OPENAI_COMPAT_API_KEY: ${OPENAI_COMPAT_API_KEY:-}
      OPENAI_COMPAT_MODEL: ${OPENAI_COMPAT_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - dictate_data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks: [dictate]

  worker:
    image: ${WORKER_IMAGE:-ghcr.io/squirrelsoft-py/dictate-worker:latest}
    restart: unless-stopped
    dns:
      - 127.0.0.11
    dns_search: []
    dns_opt:
      - "ndots:0"
    environment:
      NODE_ENV: production
      DATA_DIR: /data
      REDIS_URL: redis://redis:6379
      LOCAL_ASR_ENDPOINT: ${LOCAL_ASR_ENDPOINT:-http://asr:9000}
      ADMIN_ASR_PROVIDER: ${ADMIN_ASR_PROVIDER:-local}
      ADMIN_DIARIZATION_PROVIDER: ${ADMIN_DIARIZATION_PROVIDER:-local}
      ADMIN_LLM_PROVIDER: ${ADMIN_LLM_PROVIDER:-openai-compat}
      OPENAI_COMPAT_BASE_URL: ${OPENAI_COMPAT_BASE_URL:-}
      OPENAI_COMPAT_API_KEY: ${OPENAI_COMPAT_API_KEY:-}
      OPENAI_COMPAT_MODEL: ${OPENAI_COMPAT_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - dictate_data:/data
    depends_on:
      redis:
        condition: service_healthy
      asr:
        condition: service_started
    networks: [dictate]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "", "--loglevel", "notice"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks: [dictate]

  asr:
    image: ${ASR_IMAGE:-onerahmet/openai-whisper-asr-webservice:latest}
    restart: unless-stopped
    ports:
      - "${ASR_PORT:-9000}:9000"
    environment:
      ASR_MODEL: ${ASR_MODEL:-large-v3}
      ASR_ENGINE: ${ASR_ENGINE:-openai_whisper}
      ASR_DIARIZATION: ${ASR_DIARIZATION:-true}
    volumes:
      - asr_models:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks: [dictate]

volumes:
  dictate_data:
  redis_data:
  asr_models:

networks:
  dictate:
    driver: bridge