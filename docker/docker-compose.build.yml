# Build-from-source override.
# Adds `build:` blocks to the services in docker-compose.yml so you can
# compile the images locally instead of pulling from GHCR.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
#
# Place this file alongside docker-compose.yml and the surrounding repo
# checked out at the parent (so ../Dockerfile / ../apps/* paths resolve).

services:
  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile