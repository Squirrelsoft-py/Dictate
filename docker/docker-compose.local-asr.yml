# Local Whisper sidecar override.
# Adds the onerahmet/whisper-asr-webservice container and flips the
# default ASR provider to use it. Use this if you have enough disk /
# memory and want fully self-hosted transcription.
#
# Combine with the base compose:
#   docker compose -f docker-compose.yml -f docker-compose.local-asr.yml up -d
#
# Requirements:
#   - Disk for the Whisper model (~500 MB small, ~1.5 GB medium, ~3 GB large-v3)
#   - RAM = ASR_WORKERS * (model RAM):
#       small:    ~1 GB  per worker (FP32 CPU)
#       medium:   ~5 GB  per worker
#       large-v3: ~6 GB  per worker
#   - Outbound HTTPS to huggingface.co and github.com (model downloads
#     on first run; resume is built into urllib but slow networks
#     benefit from a smaller model).
#
# Knobs (set in .env):
#   ASR_MODEL        = small (default) | medium | large-v3
#   ASR_WORKERS      = number of parallel transcribe processes
#   ASR_MEMORY_LIMIT = docker memory cap for the asr container

services:
  api:
    environment:
      ADMIN_ASR_PROVIDER: local
      ADMIN_DIARIZATION_PROVIDER: local
    depends_on:
      asr:
        condition: service_healthy

  worker:
    environment:
      ADMIN_ASR_PROVIDER: local
      ADMIN_DIARIZATION_PROVIDER: local
    depends_on:
      asr:
        condition: service_healthy

  asr:
    build:
      context: ..
      dockerfile: docker/asr.Dockerfile
    image: dictate-asr:local
    restart: unless-stopped
    ports:
      - "${ASR_PORT:-9000}:9000}"
    environment:
      ASR_MODEL: ${ASR_MODEL:-small}
      ASR_ENGINE: openai_whisper
      ASR_DIARIZATION: ${ASR_DIARIZATION:-true}
      UVICORN_WORKERS: ${ASR_WORKERS:-2}
      OMP_NUM_THREADS: "1"
    deploy:
      resources:
        limits:
          memory: ${ASR_MEMORY_LIMIT:-5G}
    volumes:
      - asr_models:/root/.cache/whisper
      - asr_models:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/docs >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 120s
    networks: [dictate]

volumes:
  asr_models:

networks:
  dictate:
    driver: bridge
